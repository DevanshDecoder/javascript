<script>
    const xhr = new XMLHttpRequest();
    const requestUrl = 'https://www.change.photos/'
    xhr.open('GET',requestUrl);
    console.log("here");
    xhr.onreadystatechange = function(){
        console.log(xhr.readyState);
        if(xhr.readyState==4){
            const data = (this.responseText)
            console.log(data);
        }
        
    }
    xhr.send();
</script>
